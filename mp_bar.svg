<svg width="250" height="30" viewBox="0 0 250 30" xmlns="http://www.w3.org/2000/svg">
  <!-- MP Font -->
  <text transform="scale(0.8, 1)" x="0" y="24" font-family="'Impact', 'Arial Black', sans-serif" font-size="28" font-weight="900" fill="#0000FF">MP</text>
  
  <g transform="translate(40, 5) scale(2)">
    <!-- Heart outline -->
    <path d="M 2 0 H 4 V 1 H 5 V 0 H 7 V 1 H 8 V 2 H 9 V 5 H 8 V 6 H 7 V 7 H 6 V 8 H 5 V 9 H 4 V 8 H 3 V 7 H 2 V 6 H 1 V 5 H 0 V 2 H 1 V 1 H 2 V 0 Z" fill="#0000FF" stroke="#000000" stroke-width="1.5" stroke-linejoin="miter"/>
    <!-- Heart glare (white pixel) -->
    <rect x="2" y="2" width="2" height="1" fill="#FFFFFF" />
    <rect x="1" y="3" width="1" height="1" fill="#FFFFFF" />
  </g>

  <!-- Mana Bar -->
  <g transform="translate(68, 7)">
    <rect x="0" y="0" width="150" height="16" fill="#000000" />
    <rect x="2" y="2" width="146" height="12" fill="#FFFFFF" />
    <!-- Half full MP -->
    <rect x="2" y="2" width="73" height="12" fill="#0000FF" />
  </g>
</svg>
